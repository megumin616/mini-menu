<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cafe' In The Garden</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --forest:    #1B4332;
      --sage:      #52796F;
      --light-sage:#84A98C;
      --cream:     #F8F4EF;
      --beige:     #EDE8E0;
      --terracotta:#BC6C25;
      --gold:      #D4A017;
    }
    * { font-family: 'Nunito', sans-serif; box-sizing: border-box; }
    body {
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* พื้นหลัง pattern ใบไม้ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(27,67,50,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(82,121,111,0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .display-font { font-family: 'Playfair Display', serif; }
    .leaf-deco {
      position: fixed;
      opacity: 0.07;
      pointer-events: none;
      font-size: 120px;
    }
    .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(27,67,50,0.12), 0 4px 16px rgba(27,67,50,0.06);
      overflow: hidden;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.6s ease-out;
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(30px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .card-header {
      background: linear-gradient(135deg, var(--forest) 0%, var(--sage) 100%);
      padding: 2.5rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card-header::after {
      content: '🌿';
      position: absolute;
      font-size: 180px;
      right: -40px;
      bottom: -50px;
      opacity: 0.08;
    }
    .table-input {
      border: 2px solid var(--beige);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.1em;
      color: var(--forest);
      transition: all 0.3s;
      width: 100%;
      outline: none;
      font-family: 'Playfair Display', serif;
    }
    .table-input:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 4px rgba(82,121,111,0.15);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--forest), var(--sage));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
      font-family: 'Nunito', sans-serif;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(27,67,50,0.3);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: transparent;
      border: 1.5px solid var(--beige);
      color: var(--sage);
      border-radius: 10px;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Nunito', sans-serif;
    }
    .btn-secondary:hover { border-color: var(--sage); background: var(--beige); }
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #2C2C2C;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--forest); }
    .toast.error   { background: #c0392b; }
    .number-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 0.5rem 0;
    }
    .table-btn {
      background: var(--cream);
      border: 2px solid var(--beige);
      border-radius: 10px;
      padding: 0.6rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--forest);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Playfair Display', serif;
    }
    .table-btn:hover {
      background: var(--forest);
      color: white;
      border-color: var(--forest);
      transform: scale(1.05);
    }
    .loading-spinner {
      display: none;
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- ใบไม้ประดับ -->
  <div class="leaf-deco" style="top:-30px;left:-30px">🌿</div>
  <div class="leaf-deco" style="bottom:-30px;right:-30px">🍃</div>

  <div style="padding:1rem;width:100%;max-width:420px">
    <div class="card">
      <!-- Header -->
      <div class="card-header">
        <p style="color:rgba(255,255,255,0.7);font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.5rem">
          Welcome to
        </p>
        <h1 class="display-font" style="color:white;font-size:2rem;font-weight:700;margin:0;line-height:1.2">
          Cafe' In The Garden
        </h1>
        <p style="color:rgba(255,255,255,0.6);margin-top:0.5rem;font-size:0.85rem">
          ✨ Self-Ordering System
        </p>
        <!-- โลโก้ -->
        <div style="margin-top:1rem;font-size:2.5rem">☕</div>
      </div>

      <!-- Body -->
      <div style="padding:1.5rem 2rem 2rem">
        <p class="display-font" style="color:var(--forest);font-size:1rem;margin-bottom:1rem;text-align:center">
          กรุณาเลือกหมายเลขโต๊ะของคุณ
        </p>

        <!-- Quick table selector -->
        <div class="number-grid" id="tableGrid">
          <!-- JS จะสร้างปุ่ม 1-10 -->
        </div>

        <div style="display:flex;align-items:center;gap:0.8rem;margin:1rem 0">
          <div style="flex:1;height:1px;background:var(--beige)"></div>
          <span style="color:#aaa;font-size:0.8rem;white-space:nowrap">หรือกรอกตัวเลข</span>
          <div style="flex:1;height:1px;background:var(--beige)"></div>
        </div>

        <input
          type="number"
          id="tableInput"
          class="table-input"
          placeholder="เลขโต๊ะ"
          min="1"
          max="99"
        />

        <button class="btn-primary" style="margin-top:1rem" onclick="handleTableLogin()">
          <span id="btnText">🌿 เข้าสู่ระบบสั่งอาหาร</span>
          <div class="loading-spinner" id="spinner"></div>
        </button>

        <!-- Staff login link -->
        <div style="text-align:center;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--beige)">
          <button class="btn-secondary" onclick="location.href='staff-login.html'">
            👨‍💼 เข้าสู่ระบบพนักงาน
          </button>
        </div>
      </div>
    </div>

    <!-- Version -->
    <p style="text-align:center;color:var(--light-sage);font-size:0.75rem;margin-top:1rem">
      Cafe' In The Garden © 2024 | v1.0.0
    </p>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/table-login.js"></script>
</body>
</html>
