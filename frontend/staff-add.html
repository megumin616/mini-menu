<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เพิ่มพนักงาน | Cafe' In The Garden</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --forest:#1B4332; --sage:#52796F; --cream:#F8F4EF; --beige:#EDE8E0; --terracotta:#BC6C25; }
    * { font-family:'Nunito',sans-serif; box-sizing:border-box; margin:0; padding:0; }
    body {
      background: linear-gradient(135deg, var(--forest) 0%, var(--sage) 60%, #2D6A4F 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .display-font { font-family:'Playfair Display',serif; }
    .login-card {
      background: white;
      border-radius: 24px;
      width: 100%;
      max-width: 440px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.3);
      animation: slideUp 0.5s ease-out;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    .card-header {
      background: var(--cream);
      padding: 1.6rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--beige);
    }
    .form-group { margin-bottom: 1rem; }
    .form-label { display:block; font-size:0.82rem; font-weight:700; color:#555; margin-bottom:0.4rem; }
    .form-input, .form-select {
      width: 100%;
      border: 2px solid var(--beige);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      color: #2C2C2C;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'Nunito', sans-serif;
      background: white;
    }
    .form-input:focus, .form-select:focus { border-color: var(--sage); }
    .btn-login {
      background: linear-gradient(135deg, var(--forest), var(--sage));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Nunito', sans-serif;
    }
    .btn-login:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(27,67,50,0.3); }
    .btn-login:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1rem;
      color: var(--sage);
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: underline;
    }
    .error-msg { background:#FEF2F2; color:#c0392b; padding:0.7rem 1rem; border-radius:10px; font-size:0.85rem; margin-bottom:1rem; display:none; }
    .toast {
      position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(100px);
      background:var(--forest); color:white; padding:0.8rem 1.5rem;
      border-radius:50px; font-size:0.9rem; font-weight:600;
      transition:transform 0.3s ease; z-index:999;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .hint { background:var(--cream);border-radius:10px;padding:0.75rem;margin-bottom:1rem;font-size:0.78rem;color:#666;line-height:1.45; }
  </style>
</head>
<body>
  <div style="width:100%;max-width:440px">
    <div class="login-card">
      <div class="card-header">
        <div style="font-size:2.2rem;margin-bottom:0.4rem">➕</div>
        <h1 class="display-font" style="color:var(--forest);font-size:1.35rem;font-weight:700">เพิ่มบัญชีพนักงาน</h1>
        <p style="color:#888;font-size:0.82rem;margin-top:0.35rem">เฉพาะผู้ดูแลระบบ (ADMIN)</p>
      </div>

      <div style="padding:1.5rem 2rem 2rem">
        <div class="error-msg" id="errorMsg"></div>

        <div class="form-group">
          <label class="form-label">ชื่อ-นามสกุล</label>
          <input type="text" id="fullName" class="form-input" placeholder="เช่น สมชาย ใจดี" autocomplete="name"/>
        </div>

        <div class="form-group">
          <label class="form-label">Username (ใช้เข้าสู่ระบบ)</label>
          <input type="text" id="username" class="form-input" placeholder="ตัวอักษร ไม่ซ้ำกับคนอื่น" autocomplete="username"/>
        </div>

        <div class="form-group">
          <label class="form-label">รหัสผ่าน</label>
          <input type="password" id="password" class="form-input" placeholder="อย่างน้อย 6 ตัวอักษร" autocomplete="new-password"/>
        </div>

        <div class="form-group">
          <label class="form-label">บทบาท</label>
          <select id="role" class="form-select">
            <option value="STAFF">พนักงาน (STAFF)</option>
            <option value="ADMIN">ผู้ดูแล (ADMIN)</option>
          </select>
        </div>

        <div class="hint">
          พนักงานใหม่สามารถเข้าสู่ระบบได้ที่หน้า «เข้าสู่ระบบพนักงาน» ด้วย Username และรหัสผ่านที่ตั้งไว้
        </div>

        <button class="btn-login" id="submitBtn" onclick="handleSubmit()">
          บันทึกบัญชี
        </button>

        <span class="back-link" onclick="goBack()">← กลับ</span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = 'https://cafe-in-the-garden.onrender.com/api';

    function getToken() { return localStorage.getItem('staffToken'); }

    function goBack() {
      if (document.referrer && document.referrer.includes(window.location.host)) {
        history.back();
        return;
      }
      window.location.href = 'cashier.html';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function ensureAdmin() {
      const token = getToken();
      if (!token) {
        window.location.href = 'staff-login.html';
        return false;
      }
      try {
        const res = await fetch(`${API_BASE}/auth/verify`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          window.location.href = 'staff-login.html';
          return false;
        }
        if (data.data.role !== 'ADMIN') {
          window.location.href = 'cashier.html';
          return false;
        }
        return true;
      } catch {
        window.location.href = 'staff-login.html';
        return false;
      }
    }

    async function handleSubmit() {
      const fullName = document.getElementById('fullName').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const role     = document.getElementById('role').value;
      const errDiv   = document.getElementById('errorMsg');
      const btn      = document.getElementById('submitBtn');

      errDiv.style.display = 'none';

      if (!fullName || !username || !password) {
        errDiv.textContent   = 'กรุณากรอกชื่อ Username และรหัสผ่าน';
        errDiv.style.display = 'block';
        return;
      }

      btn.disabled    = true;
      btn.textContent = '⏳ กำลังบันทึก...';

      try {
        const response = await fetch(`${API_BASE}/users/staff`, {
          method:  'POST',
          headers: {
            'Content-Type':  'application/json',
            'Authorization': `Bearer ${getToken()}`
          },
          body: JSON.stringify({ fullName, username, password, role })
        });
        const data = await response.json();

        if (data.success) {
          showToast(`✅ ${data.message}`);
          document.getElementById('fullName').value = '';
          document.getElementById('username').value = '';
          document.getElementById('password').value = '';
          document.getElementById('role').value = 'STAFF';
        } else {
          errDiv.textContent   = `❌ ${data.message}`;
          errDiv.style.display = 'block';
        }
      } catch {
        errDiv.textContent   = '❌ ไม่สามารถเชื่อมต่อ Server ได้';
        errDiv.style.display = 'block';
      }

      btn.disabled    = false;
      btn.textContent = 'บันทึกบัญชี';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const ok = await ensureAdmin();
      if (!ok) return;
      document.getElementById('password').addEventListener('keypress', e => {
        if (e.key === 'Enter') handleSubmit();
      });
    });
  </script>
</body>
</html>
