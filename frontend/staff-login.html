<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เข้าสู่ระบบพนักงาน | Cafe' In The Garden</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --forest:#1B4332; --sage:#52796F; --cream:#F8F4EF; --beige:#EDE8E0; --terracotta:#BC6C25; }
    * { font-family:'Nunito',sans-serif; box-sizing:border-box; margin:0; padding:0; }
    body {
      background: linear-gradient(135deg, var(--forest) 0%, var(--sage) 60%, #2D6A4F 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .display-font { font-family:'Playfair Display',serif; }
    .login-card {
      background: white;
      border-radius: 24px;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.3);
      animation: slideUp 0.5s ease-out;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    .card-header {
      background: var(--cream);
      padding: 2rem;
      text-align: center;
      border-bottom: 1px solid var(--beige);
    }
    .form-group { margin-bottom: 1rem; }
    .form-label { display:block; font-size:0.82rem; font-weight:700; color:#555; margin-bottom:0.4rem; }
    .form-input {
      width: 100%;
      border: 2px solid var(--beige);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      color: #2C2C2C;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'Nunito', sans-serif;
    }
    .form-input:focus { border-color: var(--sage); }
    .btn-login {
      background: linear-gradient(135deg, var(--forest), var(--sage));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Nunito', sans-serif;
    }
    .btn-login:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(27,67,50,0.3); }
    .btn-login:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .role-btn {
      flex: 1;
      padding: 0.6rem;
      border: 2px solid var(--beige);
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      color: #888;
      transition: all 0.2s;
      font-family: 'Nunito', sans-serif;
    }
    .role-btn.active { border-color:var(--forest); background:var(--forest); color:white; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1rem;
      color: var(--sage);
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: underline;
    }
    .error-msg { background:#FEF2F2; color:#c0392b; padding:0.7rem 1rem; border-radius:10px; font-size:0.85rem; margin-bottom:1rem; display:none; }
    .toast {
      position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(100px);
      background:var(--forest); color:white; padding:0.8rem 1.5rem;
      border-radius:50px; font-size:0.9rem; font-weight:600;
      transition:transform 0.3s ease; z-index:999;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div style="width:100%;max-width:400px">
    <div class="login-card">
      <!-- Header -->
      <div class="card-header">
        <div style="font-size:2.5rem;margin-bottom:0.5rem">👨‍💼</div>
        <h1 class="display-font" style="color:var(--forest);font-size:1.5rem;font-weight:700">ระบบพนักงาน</h1>
        <p style="color:#888;font-size:0.85rem;margin-top:0.3rem">Cafe' In The Garden</p>
      </div>

      <!-- Form -->
      <div style="padding:1.5rem 2rem 2rem">
        <!-- Role selector -->
        <div style="display:flex;gap:0.5rem;margin-bottom:1.2rem">
          <button class="role-btn active" id="btn-kitchen" onclick="selectRole('kitchen',this)">
            🍳 ครัว
          </button>
          <button class="role-btn" id="btn-cashier" onclick="selectRole('cashier',this)">
            💰 แคชเชียร์
          </button>
        </div>

        <!-- Error -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Username -->
        <div class="form-group">
          <label class="form-label">ชื่อผู้ใช้</label>
          <input type="text" id="username" class="form-input" placeholder="กรอก Username" autocomplete="username"/>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label">รหัสผ่าน</label>
          <div style="position:relative">
            <input type="password" id="password" class="form-input" placeholder="กรอก Password" autocomplete="current-password" style="padding-right:2.5rem"/>
            <button onclick="togglePwd()"
              style="position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem">
              👁️
            </button>
          </div>
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">
          เข้าสู่ระบบ →
        </button>

        <span class="back-link" onclick="location.href='index.html'">← กลับหน้าหลัก</span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/friendly-error.js"></script>
  <script>
    const API_BASE     = 'https://cafe-in-the-garden.onrender.com/api';
    let selectedRole   = 'kitchen';

    function selectRole(role, btn) {
      selectedRole = role;
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function togglePwd() {
      const inp = document.getElementById('password');
      inp.type  = inp.type === 'password' ? 'text' : 'password';
    }

    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errDiv   = document.getElementById('errorMsg');
      const btn      = document.getElementById('loginBtn');

      errDiv.style.display = 'none';

      if (!username || !password) {
        errDiv.textContent   = 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน';
        errDiv.style.display = 'block';
        return;
      }

      btn.disabled    = true;
      btn.textContent = '⏳ กำลังเข้าสู่ระบบ...';

      try {
        // เรียก API Staff Login
        const response = await fetch(`${API_BASE}/auth/staff-login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password })
        });
        const raw = await response.text();
        let data   = null;
        try { data = raw ? JSON.parse(raw) : null; } catch { data = null; }

        if (data && data.success) {
          // บันทึก Token สำหรับพนักงาน
          localStorage.setItem('staffToken', data.data.token);
          localStorage.setItem('staffName',  data.data.user.fullName);
          localStorage.setItem('staffRole',  data.data.user.role);

          showToast(`✅ ${data.message}`);

          // Redirect ตาม role ที่เลือก
          setTimeout(() => {
            window.location.href = selectedRole === 'kitchen' ? 'kitchen.html' : 'cashier.html';
          }, 800);
        } else {
          const t = (typeof humanizeApiError === 'function')
            ? humanizeApiError((data && data.message) || null, 'staffAuth')
            : ((data && data.message) || 'เข้าสู่ระบบไม่สำเร็จ');
          errDiv.textContent   = t;
          errDiv.style.display = 'block';
          btn.disabled         = false;
          btn.textContent      = 'เข้าสู่ระบบ →';
        }
      } catch (err) {
        errDiv.textContent   = (typeof humanizeApiError === 'function' ? humanizeApiError(null, 'network') : 'อินเทอร์เน็ตขัดข้อง ลองอีกครั้ง');
        errDiv.style.display = 'block';
        btn.disabled         = false;
        btn.textContent      = 'เข้าสู่ระบบ →';
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Enter key support
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('password').addEventListener('keypress', e => {
        if (e.key === 'Enter') handleLogin();
      });
    });
  </script>
</body>
</html>
