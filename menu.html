<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เมนูอาหาร | Cafe' In The Garden</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --forest:    #1B4332;
      --sage:      #52796F;
      --light-sage:#84A98C;
      --cream:     #F8F4EF;
      --beige:     #EDE8E0;
      --terracotta:#BC6C25;
      --gold:      #D4A017;
    }
    * { font-family: 'Nunito', sans-serif; box-sizing: border-box; margin:0; padding:0; }
    body { background: var(--cream); padding-bottom: 100px; }
    .display-font { font-family: 'Playfair Display', serif; }

    /* ===== NAVBAR ===== */
    .navbar {
      background: white;
      box-shadow: 0 2px 16px rgba(27,67,50,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-top {
      background: linear-gradient(135deg, var(--forest) 0%, var(--sage) 100%);
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .navbar-title { color:white; font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; }
    .table-badge {
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }

    /* Category tabs */
    .category-tabs {
      display: flex;
      overflow-x: auto;
      padding: 0.6rem 1rem;
      gap: 0.5rem;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      background: var(--cream);
      border: 2px solid var(--beige);
      border-radius: 50px;
      padding: 0.4rem 1rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--sage);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .cat-tab:hover, .cat-tab.active {
      background: var(--forest);
      border-color: var(--forest);
      color: white;
    }

    /* ===== MENU GRID ===== */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      padding: 0.8rem;
    }
    @media (min-width: 480px) { .menu-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 768px) { .menu-grid { grid-template-columns: repeat(4, 1fr); } }

    .menu-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(27,67,50,0.06);
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
    }
    .menu-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(27,67,50,0.12); }
    .menu-card:active { transform: scale(0.97); }

    .menu-img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      background: var(--beige);
    }
    .menu-img-placeholder {
      width: 100%;
      height: 130px;
      background: linear-gradient(135deg, var(--beige), var(--light-sage));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .menu-info { padding: 0.6rem 0.7rem 0.8rem; }
    .menu-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: #2C2C2C;
      line-height: 1.3;
      margin-bottom: 0.3rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .menu-price {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--terracotta);
    }
    .menu-add-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--forest);
      color: white;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(27,67,50,0.3);
      transition: all 0.2s;
    }
    .menu-add-btn:hover { background: var(--terracotta); transform: scale(1.1); }
    .item-count-badge {
      position: absolute;
      top: 5px;
      left: 5px;
      background: var(--terracotta);
      color: white;
      border-radius: 50px;
      padding: 0.1rem 0.5rem;
      font-size: 0.7rem;
      font-weight: 700;
      display: none;
    }

    /* ===== FLOATING CART ===== */
    .floating-cart {
      position: fixed;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--forest), var(--sage));
      color: white;
      border: none;
      border-radius: 50px;
      padding: 0.9rem 2rem;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 8px 30px rgba(27,67,50,0.35);
      z-index: 200;
      transition: all 0.3s;
      min-width: 220px;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
    }
    .floating-cart:hover { transform: translateX(-50%) translateY(-3px); box-shadow: 0 12px 40px rgba(27,67,50,0.4); }
    .floating-cart.hidden { transform: translateX(-50%) translateY(150px); }
    .cart-count {
      background: var(--gold);
      color: var(--forest);
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 800;
    }

    /* ===== CART DRAWER ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }
    .cart-drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-radius: 24px 24px 0 0;
      z-index: 400;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .cart-drawer.show { transform: translateY(0); }
    .drawer-handle {
      width: 40px;
      height: 4px;
      background: var(--beige);
      border-radius: 50px;
      margin: 0.8rem auto;
    }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--cream);
    }
    .cart-item-img {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      object-fit: cover;
      background: var(--beige);
      flex-shrink: 0;
    }
    .qty-btn {
      background: var(--beige);
      border: none;
      border-radius: 8px;
      width: 28px;
      height: 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      color: var(--forest);
    }
    .qty-btn:hover { background: var(--forest); color: white; }
    .btn-confirm {
      background: linear-gradient(135deg, var(--forest), var(--sage));
      color: white;
      border: none;
      border-radius: 14px;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Nunito', sans-serif;
    }
    .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(27,67,50,0.3); }
    .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .section-title {
      color: var(--forest);
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0.8rem 1rem 0;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 80px;
      right: 1rem;
      background: var(--forest);
      color: white;
      padding: 0.7rem 1.2rem;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 999;
      transform: translateX(200px);
      transition: transform 0.3s ease;
      box-shadow: 0 4px 16px rgba(27,67,50,0.3);
    }
    .toast.show { transform: translateX(0); }
    .toast.error { background: #c0392b; }
    .skeleton {
      background: linear-gradient(90deg, var(--beige) 25%, var(--cream) 50%, var(--beige) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    .loading-card {
      border-radius: 16px;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-top">
      <div>
        <p class="navbar-title">🌿 Cafe' In The Garden</p>
      </div>
      <div style="display:flex;gap:0.5rem;align-items:center">
        <span class="table-badge" id="tableBadge">โต๊ะ -</span>
        <button onclick="location.href='order-history.html'"
          style="background:rgba(255,255,255,0.15);border:none;color:white;border-radius:8px;padding:0.3rem 0.6rem;cursor:pointer;font-size:0.8rem;font-family:'Nunito',sans-serif">
          📋 ออเดอร์
        </button>
      </div>
    </div>
    <!-- Category Tabs -->
    <div class="category-tabs" id="categoryTabs">
      <div class="cat-tab active" data-id="all" onclick="filterCategory('all', this)">🍽️ ทั้งหมด</div>
      <!-- JS จะเพิ่ม tabs จาก API -->
    </div>
  </nav>

  <!-- MENU GRID -->
  <div class="menu-grid" id="menuGrid">
    <!-- Loading skeleton -->
    <div class="loading-card"><div class="skeleton" style="height:130px"></div><div style="padding:0.7rem"><div class="skeleton" style="height:14px;margin-bottom:0.4rem"></div><div class="skeleton" style="height:12px;width:60%"></div></div></div>
    <div class="loading-card"><div class="skeleton" style="height:130px"></div><div style="padding:0.7rem"><div class="skeleton" style="height:14px;margin-bottom:0.4rem"></div><div class="skeleton" style="height:12px;width:60%"></div></div></div>
    <div class="loading-card"><div class="skeleton" style="height:130px"></div><div style="padding:0.7rem"><div class="skeleton" style="height:14px;margin-bottom:0.4rem"></div><div class="skeleton" style="height:12px;width:60%"></div></div></div>
    <div class="loading-card"><div class="skeleton" style="height:130px"></div><div style="padding:0.7rem"><div class="skeleton" style="height:14px;margin-bottom:0.4rem"></div><div class="skeleton" style="height:12px;width:60%"></div></div></div>
  </div>

  <!-- FLOATING CART BUTTON -->
  <button class="floating-cart hidden" id="cartBtn" onclick="openCart()">
    🛒 ดูรายการ
    <div class="cart-count" id="cartCount">0</div>
    <span id="cartTotal" style="font-size:0.85rem;opacity:0.9">฿0</span>
  </button>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="closeCart()"></div>

  <!-- CART DRAWER -->
  <div class="cart-drawer" id="cartDrawer">
    <div class="drawer-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 1rem 0.5rem">
      <h2 class="display-font" style="color:var(--forest);font-size:1.3rem">รายการที่เลือก 🛒</h2>
      <button onclick="closeCart()"
        style="background:var(--cream);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1rem">✕</button>
    </div>

    <!-- Cart Items -->
    <div id="cartItems" style="min-height:60px">
      <p style="text-align:center;color:#aaa;padding:2rem;font-size:0.9rem">ยังไม่มีรายการที่เลือก</p>
    </div>

    <!-- Cart Summary -->
    <div id="cartSummary" style="padding:1rem;border-top:2px solid var(--cream);display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <span style="font-weight:600;color:#555">ยอดรวม</span>
        <span class="display-font" style="font-size:1.4rem;font-weight:700;color:var(--terracotta)" id="totalDisplay">฿0</span>
      </div>
      <button class="btn-confirm" id="confirmBtn" onclick="confirmOrder()">
        🍳 ยืนยันสั่งอาหาร
      </button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="js/menu.js"></script>
</body>
</html>
